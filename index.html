<!DOCTYPE html>
<!-- HairStudio ONE v2.8 - 2026/04/27
     変更点:
       - 下部の入力バー（textarea + 送信ボタン）を削除
       - 名前入力をチャット内テキストボックスUIに変更（showNameInput関数を追加）
       - send() / u-input イベントリスナーを削除
       - チャットエリアのレイアウト調整
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HairStudio ONE｜予約システム</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
:root {
  --ink: #1a1410;
  --cream: #f6f1e9;
  --warm: #ede5d8;
  --accent: #8b6f47;
  --accent-light: #c4a882;
  --gold: #c9a96e;
  --muted: #9b8e82;
  --success: #5a9e6f;
  --danger: #b85a5a;
  --warning: #c9913a;
  --white: #ffffff;
  --radius: 16px;
  --shadow: 0 4px 24px rgba(26,20,16,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 15% 40%, rgba(139,111,71,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 15%, rgba(201,169,110,0.05) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}

/* ===== TABS ===== */
.tab-bar {
  position:fixed;
  top:0; left:0; right:0;
  z-index:100;
  background:white;
  border-bottom:1px solid rgba(139,111,71,0.15);
  display:flex;
  align-items:center;
  padding:0 20px;
  height:58px;
  gap:0;
}
.brand {
  font-family:'Shippori Mincho',serif;
  font-size:15px;
  letter-spacing:.15em;
  color:var(--ink);
  margin-right:24px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}
.brand-mark {
  width:32px;height:32px;
  border:1.5px solid var(--accent);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
}
.tab-btn {
  padding:0 18px;
  height:58px;
  border:none;
  background:transparent;
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  color:var(--muted);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .2s;
  letter-spacing:.03em;
}
.tab-btn.active {
  color:var(--accent);
  border-bottom-color:var(--accent);
}
.badge {
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--danger);
  color:white;
  font-size:10px;
  width:17px;height:17px;
  border-radius:50%;
  margin-left:6px;
  font-weight:500;
}

/* ===== PAGES ===== */
.page { display:none; padding-top:58px; min-height:100vh; position:relative; z-index:1; }
.page.active { display:block; }

/* ===== CUSTOMER PAGE ===== */
#customer-page {
  display:none;
  flex-direction:column;
  height:100vh;
  padding-top:58px;
}
#customer-page.active { display:flex; }

.chat-area {
  flex:1;
  overflow-y:auto;
  padding:24px 16px 40px;
  display:flex;
  flex-direction:column;
  gap:14px;
  scroll-behavior:smooth;
}
.chat-area::-webkit-scrollbar{width:3px;}
.chat-area::-webkit-scrollbar-thumb{background:var(--accent-light);border-radius:2px;}

.msg { display:flex; gap:10px; animation:fadeUp .3s ease; }
.msg.user { flex-direction:row-reverse; }
@keyframes fadeUp {
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
.av {
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:11px;
  margin-top:4px;
}
.av.ai { background:white;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(139,111,71,0.1);padding:2px;overflow:hidden; }
.av.user { background:white;color:var(--accent);border:1.5px solid rgba(139,111,71,0.3);font-size:13px;display:flex;align-items:center;justify-content:center; }
.bubble {
  max-width:82%;
  padding:8px 12px;
  border-radius:var(--radius);
  font-size:14px;
  line-height:1.6;
  white-space:pre-wrap;
}
.msg.ai .bubble {
  background:white;
  border:1px solid rgba(139,111,71,0.1);
  border-radius:4px var(--radius) var(--radius) var(--radius);
  box-shadow:0 2px 10px rgba(26,20,16,0.07);
}
.msg.user .bubble {
  background:white;
  color:var(--ink);
  border:1px solid rgba(139,111,71,0.15);
  border-radius:var(--radius) 4px var(--radius) var(--radius);
}
.choices {
  display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;
}
.c-btn {
  background:transparent;
  border:1px solid var(--accent);
  color:var(--accent);
  padding:7px 14px;
  border-radius:100px;
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
  transition:all .2s;
}
.c-btn:hover:not(:disabled) {
  background:var(--accent);color:white;
  transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(139,111,71,0.25);
}
.c-btn:disabled { opacity:.4;cursor:default; }

/* タイピング */
.typing { display:flex;gap:10px;animation:fadeUp .3s ease; }
.typing-dots {
  background:white;border:1px solid rgba(139,111,71,0.1);
  border-radius:4px var(--radius) var(--radius) var(--radius);
  padding:13px 16px;display:flex;gap:5px;align-items:center;
  box-shadow:0 2px 10px rgba(26,20,16,0.07);
}
.typing-dots span {
  width:6px;height:6px;border-radius:50%;background:var(--accent-light);
  animation:bounce 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes bounce {
  0%,60%,100%{transform:translateY(0);opacity:.5;}
  30%{transform:translateY(-5px);opacity:1;}
}

/* カレンダーグリッド */
/* カレンダー */
.cal-wrap { margin-top:4px; }
.cal-month-label {
  font-family:'Shippori Mincho',serif;font-size:13px;color:var(--accent);
  letter-spacing:.1em;margin:10px 0 6px;
}
.cal-header {
  display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;
}
.cal-header span {
  text-align:center;font-size:10px;color:var(--muted);padding:2px 0;
}
.cal-header span:first-child { color:#c0695a; }
.cal-header span:last-child { color:#5a7ac0; }
.cal-grid {
  display:grid;grid-template-columns:repeat(7,1fr);gap:3px;
}
.d-chip {
  background:white;border:1px solid rgba(139,111,71,0.15);
  border-radius:8px;cursor:pointer;
  transition:all .18s;min-height:44px;
  display:flex;flex-direction:row;overflow:hidden;
}
.d-chip-side { display:flex;flex-direction:column;width:6px;flex-shrink:0; }
.d-chip-side-top,.d-chip-side-bot { flex:1;cursor:pointer; }
.d-chip-body { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 2px; }
.d-chip:hover { border-color:var(--accent); }
.d-chip.disabled { opacity:.25;cursor:default;pointer-events:none;background:var(--warm); }
.d-chip.disabled .d-chip-side-top,.d-chip.disabled .d-chip-side-bot { background:#d8d4d0; }
.d-chip.selected { border:2px solid var(--accent);background:rgba(139,111,71,0.1); }
.d-chip.selected .d-num { color:var(--ink); }
.d-chip.selected .d-name { color:var(--accent);font-weight:500; }
.d-chip.empty { background:transparent;border-color:transparent;cursor:default;pointer-events:none; }
.d-num { font-size:15px;font-family:'DM Sans',sans-serif;font-weight:500;display:block;color:var(--ink); }
.d-name { font-size:9px;color:var(--muted);display:block;margin-top:2px;line-height:1.2; }
.d-chip.sun .d-num { color:#c0695a; }
.d-chip.sat .d-num { color:#5a7ac0; }
.d-chip.full { border-color:#e8a0a0;cursor:default;pointer-events:none;background:#fff0f0; }
.d-chip.full .d-num { color:#c05050; }
.d-chip.full .d-name { color:#c05050; }
.d-chip.holiday { background:#f5f3f0;cursor:default;pointer-events:none; }
.d-chip.holiday .d-num { color:#c8c0b8; }
.d-chip.holiday .d-name { color:#c8c0b8; }
.d-chip.holiday .d-chip-side-top,.d-chip.holiday .d-chip-side-bot { background:#d8d4d0; }
/* 左ラインの色 */
.side-ok      { background:#4a9fd4; }   /* 青：残り2枠（濃い） */
.side-ok-dim  { background:#a8d4ef; }   /* 薄青：残り1枠 */
.side-cut     { background:#f5aa00; }   /* 黄：残り2枠カットのみ（濃い） */
.side-cut-dim { background:#fad97a; }   /* 薄黄：残り1枠カットのみ */
.side-full    { background:#e03030; }
.side-off     { background:#d8d4d0; }
/* 選択状態 */
.d-chip.selected .d-chip-side-top,.d-chip.selected .d-chip-side-bot { opacity:0.7; }
/* 管理カレンダー用 */
.d-chip.avail-full-admin { background:#fff0f0;border-color:#e8a0a0; }
.d-chip.avail-full-admin .d-num { color:#c05050; }
.d-chip.avail-full-admin .d-name { color:#c05050; }
.d-chip.selected.sun .d-num { color:#c0695a; }
.cal-confirm-btn {
  width:100%;margin-top:10px;padding:11px;border-radius:10px;
  background:rgba(139,111,71,0.12);color:var(--accent);font-size:13px;
  border:1.5px solid rgba(139,111,71,0.4);
  font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;display:none;
  letter-spacing:.03em;
}
.cal-confirm-btn:hover { background:rgba(139,111,71,0.22);border-color:var(--accent); }

/* 確認カード */
.confirm-card {
  background:white;
  color:var(--ink);border-radius:14px;padding:18px;margin-top:10px;
  border:1px solid rgba(139,111,71,0.15);
  position:relative;overflow:hidden;
}
.confirm-card::before {
  content:'';position:absolute;top:-25px;right:-25px;
  width:80px;height:80px;border-radius:50%;border:1px solid rgba(139,111,71,0.1);
}
.confirm-card h3 {
  font-family:'Shippori Mincho',serif;font-size:12px;
  color:var(--accent);letter-spacing:.15em;margin-bottom:12px;
}
.c-row {
  display:flex;justify-content:space-between;align-items:baseline;
  font-size:13px;padding:6px 0;border-bottom:1px solid rgba(26,20,16,0.08);
}
.c-row:last-child { border-bottom:none; }
.c-label { color:var(--muted);font-size:11px;letter-spacing:.04em; }
.c-val { color:var(--ink); }
.duration-badge {
  display:inline-block;background:rgba(201,169,110,0.2);
  color:var(--gold);border-radius:100px;padding:2px 10px;font-size:11px;
}

/* ===== ADMIN PAGE ===== */
#admin-page { padding:58px 0 40px; }
.admin-inner { max-width:800px;margin:0 auto;padding:24px 16px; }
.admin-header {
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;
}
.admin-header h2 {
  font-family:'Shippori Mincho',serif;font-size:20px;letter-spacing:.1em;
}

/* 日別サマリー */
.day-summary {
  background:white;border-radius:var(--radius);padding:16px;
  margin-bottom:20px;border:1px solid rgba(139,111,71,0.1);
  box-shadow:var(--shadow);
}
.day-summary h3 {
  font-family:'Shippori Mincho',serif;font-size:14px;
  color:var(--accent);margin-bottom:12px;letter-spacing:.08em;
}
.capacity-bar {
  height:8px;background:var(--warm);border-radius:4px;overflow:hidden;margin-bottom:6px;
}
.capacity-fill {
  height:100%;border-radius:4px;transition:width .6s ease;
  background:#5a9abf;
}
.capacity-fill.warn { background:#c8a020; }
.capacity-fill.full { background:#c05050; }
.capacity-text { font-size:12px;color:var(--muted); }

/* 予約カード */
.req-card {
  background:white;border-radius:var(--radius);padding:18px;
  margin-bottom:12px;border:1px solid rgba(139,111,71,0.1);
  box-shadow:0 2px 12px rgba(26,20,16,0.06);
  transition:transform .2s;
}
.req-card:hover { transform:translateY(-1px); }
.req-card.pending { border-left:3px solid var(--warning); }
.req-card.approved { border-left:3px solid var(--success); opacity:.7; }
.req-card.rejected { border-left:3px solid var(--danger); opacity:.5; }
.req-header {
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  margin-bottom:12px;
}
.req-name {
  font-family:'Shippori Mincho',serif;font-size:16px;letter-spacing:.05em;
}
.req-type {
  font-size:11px;padding:3px 10px;border-radius:100px;font-weight:500;
}
.req-type.new { background:rgba(139,111,71,0.12);color:var(--accent); }
.req-type.regular { background:rgba(90,158,111,0.12);color:var(--success); }
.req-meta {
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;
}
.req-meta-item { font-size:12px; }
.req-meta-item .lbl { color:var(--muted);font-size:10px;display:block;margin-bottom:1px; }
.req-meta-item .val { color:var(--ink);font-size:13px; }
.req-notes {
  background:var(--warm);border-radius:8px;padding:10px 12px;
  font-size:12px;color:var(--ink);line-height:1.7;margin-bottom:12px;
}
.req-notes .lbl { color:var(--muted);font-size:10px;display:block;margin-bottom:4px; }
.ai-summary {
  background:rgba(139,111,71,0.07);border-radius:8px;padding:10px 12px;
  font-size:12px;color:var(--accent);line-height:1.7;margin-bottom:14px;
  border:1px solid rgba(139,111,71,0.15);
}
.ai-summary::before { content:'✦ AI判定　'; font-weight:500; }
.req-actions { display:flex;gap:8px; }
.btn-approve {
  flex:1;padding:10px;border-radius:10px;border:none;
  background:var(--success);color:white;font-size:13px;
  font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;
}
.btn-approve:hover { background:#4a8e5f;transform:translateY(-1px); }
.btn-reject {
  flex:1;padding:10px;border-radius:10px;border:none;
  background:transparent;color:var(--danger);font-size:13px;
  font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;
  border:1px solid var(--danger);
}
.btn-reject:hover { background:var(--danger);color:white; }
.status-pill {
  padding:4px 14px;border-radius:100px;font-size:12px;font-weight:500;
}
.status-pill.approved { background:rgba(90,158,111,0.12);color:var(--success); }
.status-pill.rejected { background:rgba(184,90,90,0.1);color:var(--danger); }
.status-pill.awaiting_customer { background:rgba(230,126,34,0.12);color:#e67e22; }

/* トースト */
.toast {
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--ink);color:var(--cream);padding:12px 24px;border-radius:100px;
  font-size:13px;z-index:999;transition:transform .3s ease;pointer-events:none;
}
.toast.show { transform:translateX(-50%) translateY(0); }

/* 空状態 */
.empty-state {
  text-align:center;padding:48px 24px;color:var(--muted);
}
.empty-state .icon { font-size:40px;margin-bottom:12px;opacity:.4; }
.empty-state p { font-size:14px;line-height:1.8; }

/* 設定パネル */
.settings-row {
  background:white;border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border:1px solid rgba(139,111,71,0.1);margin-bottom:8px;
}
.settings-row label { font-size:13px;color:var(--ink); }
.settings-row input[type=number] {
  width:70px;border:1px solid rgba(139,111,71,0.25);border-radius:8px;
  padding:6px 10px;font-size:14px;font-family:'DM Sans',sans-serif;
  text-align:center;outline:none;color:var(--ink);
}
.settings-row input[type=number]:focus { border-color:var(--accent); }

.section-title {
  font-family:'Shippori Mincho',serif;font-size:13px;color:var(--muted);
  letter-spacing:.1em;margin:20px 0 10px;
}

/* レスポンシブ */
@media(max-width:480px){
  .req-meta { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<!-- タブバー -->
<div class="tab-bar">
  <div class="brand">
    <img src="logo.jpg" alt="Hair Studio ONE" style="height:38px;width:auto;object-fit:contain;">
  </div>
  <button class="tab-btn active" onclick="showTab('customer')" onlongpress="showTab('admin')" id="customer-tab">予約フォーム</button>
  <button class="tab-btn" onclick="showTab('admin')" id="admin-tab" style="display:none">
    管理画面<span class="badge" id="pending-badge" style="display:none">0</span>
  </button>
</div>

<!-- ===== お客様ページ ===== -->
<div id="customer-page" class="page active">
  <div class="chat-area" id="chat"></div>
</div>

<!-- ===== 管理ページ ===== -->
<div id="admin-page" class="page">
  <div class="admin-inner">
    <div class="admin-header">
      <h2>予約管理</h2>
    </div>

    <!-- 管理タブ -->
    <div style="display:flex;border-bottom:2px solid rgba(139,111,71,0.15);margin-bottom:16px;">
      <button id="atab-booking" onclick="switchAdminTab('booking')" style="flex:1;padding:10px;border:none;background:none;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--accent);border-bottom:2px solid var(--accent);margin-bottom:-2px;font-weight:500;">予約管理</button>
      <button id="atab-customers" onclick="switchAdminTab('customers')" style="flex:1;padding:10px;border:none;background:none;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;">お客様データ</button>
    </div>

    <!-- 予約管理タブ -->
    <div id="admin-tab-booking">
      <!-- 空き状況カレンダー -->
      <div class="section-title">▸ 空き状況の設定</div>
      <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;font-size:11px;">
        <span style="color:var(--muted);align-self:center;">タップで切り替え：</span>
        <span style="padding:3px 8px;border-radius:20px;background:#f2f8ff;border:1px solid #c0d8ee;color:#5a9abf;">🔵 空き</span>
        <span style="padding:3px 8px;border-radius:20px;background:#fffdf0;border:1px solid #e8d898;color:#c8a020;">🟡 カットのみ</span>
        <span style="padding:3px 8px;border-radius:20px;background:#fff0f0;border:1px solid #e8a0a0;color:#c05050;">🔴 満枠</span>
      </div>
      <button id="sync-cal-btn" onclick="syncAndRefresh()" style="margin-bottom:10px;width:100%;padding:9px;border-radius:8px;border:1.5px solid rgba(74,159,212,0.5);background:rgba(74,159,212,0.08);color:#4a9fd4;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;">📅 空き枠をGoogleカレンダーと同期する（手動）</button>
      <div id="admin-cal-wrap"></div>

      <!-- 休業日設定 -->
      <div class="section-title" style="margin-top:20px;">▸ 休業日設定</div>
      <div style="background:white;border-radius:12px;padding:16px;border:1px solid rgba(139,111,71,0.1);margin-bottom:8px;">
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">月曜日は定休日として自動的に除外されます。<br>臨時休業日・連休は下記から追加してください。</div>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">
          <input type="date" id="closed-date-input"
            style="flex:1;border:1px solid rgba(139,111,71,0.25);border-radius:8px;padding:8px 10px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;color:var(--ink);">
          <button onclick="addClosedDate()"
            style="padding:8px 16px;border-radius:8px;border:none;background:var(--ink);color:var(--gold);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;">
            ＋ 追加
          </button>
        </div>
        <div id="closed-dates-list"></div>
      </div>

      <!-- メール通知先 -->
      <div class="section-title" style="margin-top:20px;">▸ メール通知先</div>
      <div class="settings-row">
        <label>メールアドレス</label>
        <input type="text" id="notify-email" placeholder="your@email.com"

async function initLiff() {
  try {
    if (typeof liff === 'undefined') {
      console.log('LIFF SDK未読み込み（通常ブラウザで動作中）');
      liffReady = false;
      return;
    }
    await liff.init({ liffId: LIFF_ID });
    liffReady = true;
    if (liff.isLoggedIn()) {
      // ログイン済み：プロフィール取得
      lineProfile = await liff.getProfile();
      console.log('LINE profile:', lineProfile);
    } else {
      // 未ログイン：LINEクライアント内外問わずログイン
      liff.login();
      return;
    }
    // LINEクライアント内では管理画面タブを非表示
    if (liff.isInClient()) {
      const adminTab = document.getElementById('admin-tab');
      if (adminTab) adminTab.style.display = 'none';
    }
  } catch (e) {
    console.warn('LIFF init failed (通常ブラウザで動作中):', e);
    liffReady = false;
  }
}

function showCutMenuPicker(text) {

  const dropWrap = document.createElement('div');

  const select = document.createElement('select');
  select.style.cssText = 'width:100%;border:1px solid rgba(139,111,71,0.3);border-radius:8px;padding:9px 12px;font-size:13px;font-family:"DM Sans",sans-serif;outline:none;color:var(--ink);background:white;cursor:pointer;';

    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    if (v === '-- 選択してください --') opt.disabled = true;
    select.appendChild(opt);
  });
  select.value = '-- 選択してください --';
  dropWrap.appendChild(select);

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'c-btn';
  confirmBtn.style.cssText = 'margin-top:8px;width:100%;border-color:var(--ink);color:var(--ink);opacity:0.4;pointer-events:none;display:none;';
  confirmBtn.textContent = '→ 次へ';

  let currentMenu = '';
  const simpleMenus = ['カット無し（オプションのみ）', 'カット＋追加メニュー'];

  select.onchange = () => {
    if (select.value !== '-- 選択してください --') {
      confirmBtn.style.opacity = '1';
      confirmBtn.style.pointerEvents = 'auto';
      confirmBtn.textContent = `→ ${currentMenu} / ${select.value} で次へ`;
    }
  };

  ['カット', 'カット&シャンプー', 'カット無し（オプションのみ）', 'カット＋追加メニュー'].forEach(menu => {
    const btn = document.createElement('button');
    btn.className = 'c-btn';
    const isRestricted = bk.cutOnly && (menu === 'カット無し（オプションのみ）' || menu === 'カット＋追加メニュー');
    if (isRestricted) {
      btn.textContent = `${menu}（カットのみ予約可のためご利用不可）`;
      btn.disabled = true;
      btn.style.opacity = '0.35';
      btn.style.cursor = 'default';
      btn.style.fontSize = '11px';
    } else {
      btn.textContent = menu;
      btn.onclick = () => {
        choicesDiv.querySelectorAll('.c-btn').forEach(b => { b.style.background=''; b.style.color=''; });
        btn.style.background = 'var(--accent)'; btn.style.color = 'white';
        currentMenu = menu;
        if (simpleMenus.includes(menu)) {
          dropWrap.style.display = 'none';
          confirmBtn.style.display = 'block';
          confirmBtn.style.opacity = '1';
          confirmBtn.style.pointerEvents = 'auto';
          confirmBtn.textContent = `→ ${menu} で次へ`;
        } else {
          dropWrap.style.display = 'block';
          confirmBtn.style.display = 'block';
          confirmBtn.style.opacity = '0.4';
          confirmBtn.style.pointerEvents = 'none';
          select.value = '-- 選択してください --';
          confirmBtn.textContent = '→ 次へ';
        }
      };
    }
    choicesDiv.appendChild(btn);
  });

  confirmBtn.onclick = () => {
    choicesDiv.querySelectorAll('.c-btn').forEach(b => b.disabled = true);
    select.disabled = true; confirmBtn.disabled = true;
    const cutType = simpleMenus.includes(currentMenu) ? '' : select.value;
    userMsg(cutType ? `${currentMenu} / ${cutType}` : currentMenu);
    bk.cutMenu = currentMenu;
    if (cutType) bk.cutType = cutType;
    setTimeout(() => processCutMenuChoice(currentMenu, cutType), 300);

  backToDateBtn.className = 'c-btn';
  backToDateBtn.style.cssText = 'margin-top:6px;width:100%;font-size:11px;color:var(--muted);border-color:rgba(155,142,130,0.4);';

    choicesDiv.querySelectorAll('button').forEach(b => b.disabled = true);

      step = 'date';
      bk.dateTimePref = [];
      selectedDates = [];
      showDatePicker();
    }, 200);
  };

  bub.appendChild(choicesDiv);
  bub.appendChild(dropWrap);
  bub.appendChild(confirmBtn);
  bub.appendChild(backToDateBtn);
  wrap.appendChild(av); wrap.appendChild(bub);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

async function aiReply(prompt) {
  typing();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:500,
        system:`あなたはHairStudio ONEの予約AIアシスタントです。返答は短く、親切な日本語で。テキストのみ（HTMLや記号不要）。`,
        messages:[{role:'user', content: prompt}]
      })
    });
    const d = await res.json();
    removeTyping();
    if (d.error) {
      console.error('API error response:', d.error);
      return d.error.message || 'エラーが発生しました。';
    }
    return d.content?.[0]?.text || 'ありがとうございます。';
  } catch(e) {
    removeTyping();
    console.error('API fetch error:', e);
    return 'しばらくお待ちください。もう一度お試しいただくか、お電話でもお気軽にどうぞ。';
  }
}

// ===== 施術時間計算 =====
function calcDuration() {
  const lenKey = bk.hairLength === 'ショート（肩上）' ? 'short' : bk.hairLength === 'ロング（胸より下）' ? 'long' : 'medium';
  let total = 0;
  // ベースカット
  if (bk.cutMenu && bk.cutMenu !== 'カット無し') {
    const base = BASE_DURATION[bk.cutMenu] || BASE_DURATION['カット'];
    total += base[lenKey];
  }
  // オプション
  (bk.options || []).forEach(opt => {
    const tbl = OPTION_DURATION[opt];
    if (tbl) total += tbl[lenKey];
  });
  // パーマ種類追加
  if (bk.permType) total += (PERM_TYPE_ADD[bk.permType] || 0);
  // カラー種類追加
  if (bk.colorType) total += (COLOR_TYPE_ADD[bk.colorType] || 0);
  return total || 60;
}

// ===== 日付ピッカー（3日選択） =====
function getAvailableDates() {
  // 常に最新のsettingsを読み込む
  settings = JSON.parse(localStorage.getItem('hs_settings') || '{"maxHours":8,"closedDates":[],"dayStatus":{}}');
  if (!settings.closedDates) settings.closedDates = [];
  if (!settings.dayStatus) settings.dayStatus = {};
  const days = ['日','月','火','水','木','金','土'];
  const result = [];
  const today = new Date();
  // ⭐ 28日後まで（カレンダー表示が4週間=28日のため）
  for (let i = 0; i <= 28; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const dow = d.getDay();
    // 月曜日（1）は定休日
    if (dow === 1) continue;
    const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
    // 臨時休業日
    const isClosed = (settings.closedDates || []).includes(dateStr);
    // dayStatusから満枠判定（午前・午後個別設定対応）
    const baseStatus = settings.dayStatus[dateStr] || 'ok';
    const amStatus = settings.dayStatus[dateStr + '_am'] || baseStatus;
    const pmStatus = settings.dayStatus[dateStr + '_pm'] || baseStatus;
    const full = !isClosed && amStatus === 'full' && pmStatus === 'full';
    result.push({ date: d, label: dateStr, day: days[dow], dayNum: dow, full, closed: isClosed });
  }
  return result;
}

function getUsedMinutes(dateLabel) {
  // 常に最新のrequestsをlocalStorageから読む
  const latest = JSON.parse(localStorage.getItem('hs_requests') || '[]');
  return latest
    .filter(r => r.date === dateLabel && r.status === 'approved')
    .reduce((sum, r) => sum + (r.duration || 60), 0);
}


// 左2色ラインのHTML生成
// ⭐ 5状態を直接解釈：ok / ok-dim / cut / cut-dim / full
function chipSideHtml(amStatus, pmStatus) {
  function slotClass(st) {
    if (st === 'full')     return 'side-full';
    if (st === 'closed' || st === 'holiday') return 'side-off';
    if (st === 'cut-dim')  return 'side-cut-dim';
    if (st === 'cut' || st === 'cut-only') return 'side-cut';
    if (st === 'ok-dim')   return 'side-ok-dim';
    if (st === 'ok')       return 'side-ok';
    return 'side-ok';
  }

  const am = slotClass(amStatus);
  const pm = slotClass(pmStatus);
  return `<div class="d-chip-side"><div class="d-chip-side-top ${am}"></div><div class="d-chip-side-bot ${pm}"></div></div>`;
}

function getDayStatuses(label) {
  // 常に最新のsettingsから取得
  const s = JSON.parse(localStorage.getItem('hs_settings') || '{}');
  const dayStatus = s.dayStatus || {};
  const base = dayStatus[label] || 'ok';
  const am = dayStatus[label + '_am'] || base;
  const pm = dayStatus[label + '_pm'] || base;
  return { am, pm };
}

// 空き状況：dayStatusから取得（午前・午後個別設定対応）
function getAvailabilityLevel(dateLabel) {
  settings = JSON.parse(localStorage.getItem('hs_settings') || '{"maxHours":8,"closedDates":[],"dayStatus":{}}');
  if (!settings.dayStatus) settings.dayStatus = {};
  const base = settings.dayStatus[dateLabel] || 'ok';
  const am = settings.dayStatus[dateLabel + '_am'] || base;
  const pm = settings.dayStatus[dateLabel + '_pm'] || base;
  // 両方満枠
  if (am === 'full' && pm === 'full') return 'full';
  // 両方完全空き
  if (am === 'ok' && pm === 'ok') return 'ok';
  // ⭐ ok-dim / cut / cut-dim / cut-only いずれかが含まれる → 'some'
  const isLimited = (s) => s === 'ok-dim' || s === 'cut' || s === 'cut-dim' || s === 'cut-only' || s === 'full';
  if (isLimited(am) || isLimited(pm)) return 'some';
  return 'ok';
}

// 日付ごとに順番に時間希望を聞く
function askTimeForDate(idx) {
  if (idx >= selectedDates.length) {
    bk.timePref = bk.dateTimePref.map((t,i) => {
      const d = selectedDates[i];
      return `第${i+1}希望 ${d.date.getMonth()+1}/${d.date.getDate()}(${d.day})：${t}`;
    }).join('\n');
    // 選択した時間帯が実際にカットのみかどうかをステータスから判定
    bk.cutOnly = selectedDates.some((sd, i) => {
      if (!sd.cutOnly) return false; // 青の日は除外
      const t = bk.dateTimePref[i] || '';
      const lbl = sd.label;
      const am = settings.dayStatus[lbl + '_am'] || settings.dayStatus[lbl] || 'ok';
      const pm = settings.dayStatus[lbl + '_pm'] || settings.dayStatus[lbl] || 'ok';
      // ⭐ カット制限状態（cut / cut-dim / cut-only いずれか）を判定
      const isCut = (s) => s === 'cut' || s === 'cut-dim' || s === 'cut-only';
      // 選んだ時間帯のステータスがカット制限 or fullかチェック
      if (t.includes('午前') && isCut(am)) return true;
      if (t.includes('午後') && isCut(pm)) return true;
      if (t.includes('午前') && am === 'full') return false; // 午前満枠は選べないはずだが念のため
      if (t.includes('午後') && pm === 'full') return false;
      // おまかせの場合は両方カット制限なら制限
      if (t.includes('おまかせ') && isCut(am) && isCut(pm)) return true;
      return false;
    });
    // 日程確定後→メニュー選択へ
    step = 'cutMenu';
    setTimeout(() => showCutMenuPicker('ありがとうございます！\n次にご希望のメニューをお選びください。'), 400);
    return;

  ['選択してください','9:00','9:30','10:00','10:30','11:00','11:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30'].forEach(t => {

// ===== 複数選択オプション =====
function showOptionPicker() {
  step = 'options';
  selectedOptions = [];
  const opts = ['パーマ','カラー','縮毛矯正','トリートメント','その他'];
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  const av = document.createElement('div');
  av.className = 'av ai'; av.innerHTML = '<img src="logo.jpg" style="width:32px;height:32px;object-fit:contain;" alt="ONE">';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = 'オプションメニューをお選びください。\n（複数選択できます）';

  const choicesDiv = document.createElement('div');
  choicesDiv.className = 'choices';

  const doneBtn = document.createElement('button');
  doneBtn.className = 'c-btn';
  doneBtn.style.cssText = 'margin-top:6px;border-color:var(--ink);color:var(--ink);display:none;';
  doneBtn.textContent = '✔ 選択完了（オプションなしの方もこちら）';
doneBtn.style.cssText = 'margin-top:10px;width:100%;padding:10px;background:rgba(139,111,71,0.12);color:var(--accent);border:1.5px solid rgba(139,111,71,0.4);border-radius:10px;font-size:13px;cursor:pointer;font-family:"DM Sans",sans-serif;';

  const btnMap = {};

  function updateButtonStates() {
    const hasKyokumo = selectedOptions.includes('縮毛矯正');
    const hasPermaOrColor = selectedOptions.includes('パーマ') || selectedOptions.includes('カラー');
    ['パーマ','カラー'].forEach(o => {
      if (btnMap[o]) {
        btnMap[o].disabled = hasKyokumo;
        btnMap[o].style.opacity = hasKyokumo ? '0.3' : '1';
      }
    });
    if (btnMap['縮毛矯正']) {
      btnMap['縮毛矯正'].disabled = hasPermaOrColor;
      btnMap['縮毛矯正'].style.opacity = hasPermaOrColor ? '0.3' : '1';
    }
  }

  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'c-btn';
    btn.textContent = opt;
    btnMap[opt] = btn;
    btn.onclick = () => {
      const idx = selectedOptions.indexOf(opt);
      if (idx >= 0) {
        selectedOptions.splice(idx, 1);
        btn.style.background = '';
        btn.style.color = '';
      } else {
        selectedOptions.push(opt);
        btn.style.background = 'var(--accent)';
        btn.style.color = 'white';
      }
      updateButtonStates();
      doneBtn.style.display = 'inline-block';
    };
    choicesDiv.appendChild(btn);
  });

  // その他のテキスト入力欄
  const otherWrap = document.createElement('div');
  otherWrap.style.cssText = 'margin-top:8px;display:none;';
  const otherInput = document.createElement('textarea');
  otherInput.placeholder = 'その他の内容をご記入ください。';
  otherInput.rows = 2;
  otherInput.style.cssText = 'width:100%;border:1px solid rgba(139,111,71,0.3);border-radius:8px;padding:8px 12px;font-size:13px;font-family:"DM Sans",sans-serif;outline:none;color:var(--ink);resize:none;line-height:1.6;';
  otherWrap.appendChild(otherInput);

  // その他ボタンのonclickに入力欄表示を追加
  if (btnMap['その他']) {
    const origOnclick = btnMap['その他'].onclick;
    btnMap['その他'].onclick = () => {
      origOnclick && origOnclick();
      otherWrap.style.display = selectedOptions.includes('その他') ? 'block' : 'none';
    };
  }

  doneBtn.onclick = () => {
    choicesDiv.querySelectorAll('button').forEach(b => b.disabled = true);
    otherInput.disabled = true;
    doneBtn.disabled = true;
    bk.options = selectedOptions;
    bk.optionOther = selectedOptions.includes('その他') ? otherInput.value.trim() : '';
    const label = selectedOptions.length > 0 ? selectedOptions.join('、') + (bk.optionOther ? `（${bk.optionOther}）` : '') : 'オプションなし';
    userMsg(label);
    setTimeout(() => afterOptions(), 400);
  };

  choicesDiv.appendChild(doneBtn);
  bub.appendChild(choicesDiv);
  bub.appendChild(otherWrap);
  wrap.appendChild(av); wrap.appendChild(bub);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;

  // 最初からdoneBtn表示（オプションなしも選べる）
  setTimeout(() => { doneBtn.style.display = 'inline-block'; }, 100);
}

async function afterOptions() {
  // 縮毛矯正がある → 新規のみカウンセリングへ
  if (selectedOptions.includes('縮毛矯正') && isNew) {
    showKyokumoCounseling();
    return;
  }
  // パーマがある → パーマ種類へ
  if (selectedOptions.includes('パーマ')) {
    step = 'permType';
    msg('ai', 'パーマの種類をお選びください。', [
      'ノーマルパーマ',
      'デザインパーマ',

    ]);
    return;
  }
  // カラーがある → カラー種類へ
  if (selectedOptions.includes('カラー')) {

      'おしゃれ染め',
      '白髪染め',
      'デザインカラー（インナーカラー・部分カラー）',

}

    }
  } else if (isShiragaSome) {
    ans.q1 = '白髪染め';
    q1 = null;
  } else {
    // デザインカラー：テキスト入力（新規・常連 共通、注意書きは新規のみ）
    const q1wrap = document.createElement('div');
    const q1lbl = document.createElement('div');

    if (isNew) {

      q1note.style.cssText = 'font-size:11px;color:var(--danger);margin-bottom:6px;line-height:1.6;';

      q1wrap.appendChild(q1lbl);
      q1wrap.appendChild(q1note);
    } else {
      q1wrap.appendChild(q1lbl);
    }
    const q1input = document.createElement('textarea');
    q1input.placeholder = 'ご希望のスタイルやイメージをできるだけ詳しくお書きください。';
    q1input.rows = 2;
    q1input.style.cssText = 'width:100%;border:1px solid rgba(139,111,71,0.3);border-radius:8px;padding:8px 12px;font-size:13px;font-family:"DM Sans",sans-serif;outline:none;color:var(--ink);resize:none;line-height:1.6;';
    q1input.oninput = () => { ans.q1 = q1input.value.trim(); };
    q1wrap.appendChild(q1input);
    q1 = q1wrap;
  }

  // ② 髪の状態（新規のみ）
  let q2 = null;
  if (isNew) {
    q2 = mkQuestion('② 現在の髪の状態', [
      '健康でダメージなし','少しダメージあり','ダメージが気になる',
      'パサつき・広がりあり','くせ毛・うねりあり','細くてやわらかい','太くて硬い',
    ], v => { ans.condition = v; });
  }

  // ③ 直近の毛染め歴（新規のみ）
  let q3label = null, q3choices = null;
  let selectedDyeExps = [];
  const dyeBtnMap = {};
  if (isNew) {
    q3label = document.createElement('div');
    q3label.style.cssText = 'font-size:12px;color:var(--muted);margin:12px 0 6px;font-weight:500;';
    q3label.textContent = '③ 直近の毛染め歴';
    q3choices = document.createElement('div');
    q3choices.className = 'choices';

    ['染めたことがない','1ヶ月以内','2〜3ヶ月前','半年前','1年以上前','自宅染め'].forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'c-btn';
      btn.textContent = v;
      dyeBtnMap[v] = btn;
      btn.onclick = () => {
        const idx = selectedDyeExps.indexOf(v);
        if (idx >= 0) {
          selectedDyeExps.splice(idx, 1);
          btn.style.background = ''; btn.style.color = '';
        } else {
          if (v === '染めたことがない') {
            selectedDyeExps = ['染めたことがない'];
            Object.entries(dyeBtnMap).forEach(([k, b]) => {
              b.style.background = ''; b.style.color = '';
              b.disabled = k !== '染めたことがない';
              b.style.opacity = k !== '染めたことがない' ? '0.3' : '1';
            });
            btn.style.background = 'var(--accent)'; btn.style.color = 'white';
            btn.disabled = false; btn.style.opacity = '1';
          } else {
            const noneIdx = selectedDyeExps.indexOf('染めたことがない');
            if (noneIdx >= 0) {
              selectedDyeExps.splice(noneIdx, 1);
              dyeBtnMap['染めたことがない'].style.background = '';
              dyeBtnMap['染めたことがない'].style.color = '';
            }
            Object.values(dyeBtnMap).forEach(b => { b.disabled = false; b.style.opacity = '1'; });
            selectedDyeExps.push(v);
            btn.style.background = 'var(--accent)'; btn.style.color = 'white';
          }
        }
        if (!selectedDyeExps.includes('染めたことがない')) {
          Object.values(dyeBtnMap).forEach(b => { b.disabled = false; b.style.opacity = '1'; });
        }
        ans.dyeExp = selectedDyeExps.join('・');
      };
      q3choices.appendChild(btn);
    });
  }

  // ④ ブリーチ経験（デザインカラー かつ 新規のみ）
  let q4 = null;
  if (!isOshare && !isShiragaSome && isNew) {
    const q4wrap = document.createElement('div');
    const q4lbl = document.createElement('div');
    q4lbl.style.cssText = 'font-size:12px;color:var(--muted);margin:12px 0 6px;font-weight:500;';

      };
      q4choices.appendChild(btn);
    });
    q4wrap.appendChild(q4lbl);
    q4wrap.appendChild(q4choices);
    q4 = q4wrap;
  }

  // 送信ボタン
  const doneBtn = mkDoneBtn(() => {
    if (!ans.q1 && !isShiragaSome) return false;
    if (isNew && (!ans.condition || !ans.dyeExp)) return false;
    if (isNew && !isOshare && !isShiragaSome && !ans.bleach) return false;
    const q1label = isOshare ? '明るさ／イメージ' : isShiragaSome ? '種別' : 'スタイル';
    if (isNew) {
      const bleachPart = (!isOshare && !isShiragaSome) ? `／ブリーチ経験：${ans.bleach}` : '';
      bk.counseling = `${q1label}：${ans.q1}／髪の状態：${ans.condition}／毛染め歴：${ans.dyeExp}${bleachPart}`;
    } else {
      bk.counseling = `${q1label}：${ans.q1}`;
    }
    userMsg(bk.counseling);
    lockWrap(wrap);
    setTimeout(() => afterCounseling(), 400);
    return true;
  });

  // 戻るボタン
  const backBtn = document.createElement('button');
  backBtn.className = 'c-btn';
  backBtn.style.cssText = 'margin-top:6px;font-size:11px;color:var(--muted);border-color:rgba(155,142,130,0.4);';
  backBtn.textContent = '← カラーの種類に戻る';
  backBtn.onclick = () => {
    lockWrap(wrap);
    userMsg('← 戻る');
    setTimeout(() => {
      step = 'colorType';
      msg('ai', 'カラーの種類をお選びください。', [
        'おしゃれ染め', '白髪染め',
        'デザインカラー（インナーカラー・部分カラー）', 'その他',
      ]);
    }, 200);
  };

  if (q1) bub.appendChild(q1);
  if (q2) bub.appendChild(q2);
  if (q3label) { bub.appendChild(q3label); bub.appendChild(q3choices); }
  if (q4) bub.appendChild(q4);
  bub.appendChild(doneBtn);
  bub.appendChild(backBtn);
  wrap.appendChild(av); wrap.appendChild(bub);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

// ===== カウンセリングUI ヘルパー =====
function mkQuestion(label, items, onChange) {
  const wrap = document.createElement('div');
  const lbl = document.createElement('div');
  lbl.style.cssText = 'font-size:12px;color:var(--muted);margin:12px 0 6px;font-weight:500;';
  lbl.textContent = label;
  const choices = document.createElement('div');
  choices.className = 'choices';
  items.forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'c-btn';
    btn.textContent = v;
    btn.style.fontSize = '12px';
    btn.onclick = () => {
      choices.querySelectorAll('.c-btn').forEach(b => { b.style.background=''; b.style.color=''; });
      btn.style.background = 'var(--accent)'; btn.style.color = 'white';
      onChange(v);
    };
    choices.appendChild(btn);
  });
  wrap.appendChild(lbl);
  wrap.appendChild(choices);
  return wrap;
}

function mkDoneBtn(onDone) {
  const btn = document.createElement('button');
  btn.className = 'c-btn';
  btn.style.cssText = 'margin-top:14px;width:100%;border-color:var(--ink);color:var(--ink);';
  btn.textContent = '→ この内容で送信する';
  btn.onclick = () => {
    const ok = onDone();
    if (!ok) {
      btn.textContent = '⚠ 全項目を選択してください';
      setTimeout(() => { btn.textContent = '→ この内容で送信する'; }, 1500);
    }
  };
  return btn;
}

function lockWrap(wrap) {
  wrap.querySelectorAll('button, input').forEach(el => el.disabled = true);
}

  bk.duration = calcDuration();

  }
}

async function submitBooking() {
  typing();
  await new Promise(r => setTimeout(r, 1000));

  const optText = bk.options && bk.options.length > 0
    ? bk.options.join('・') + (bk.permType?`（${bk.permType}）`:'') + (bk.colorType?`（${bk.colorType}）`:'')
    : 'なし';
  const req = {
    id: Date.now(),
    ...bk,
    isNew,
    status: 'pending',
    createdAt: new Date().toLocaleString('ja-JP'),
    aiNote: `${isNew?'新規':'ご来店歴あり'}客。カット：${bk.cutMenu||'なし'}${bk.cutType?' ('+bk.cutType+')':''}、オプション：${optText}、髪の長さ：${bk.hairLength}。所要約${bk.duration}分。${isNew?'カウンセリング要確認。':''}`
  };
  requests.push(req);

}

// スプレッドシートから予約データを取得してlocalStorageと統合
async function syncBookingsFromSheet() {
  if (!GAS_URL) return;
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 8000);
    const res = await fetch(`${GAS_URL}?action=getBookings`, { signal: ctrl.signal });
    clearTimeout(timer);
    const data = await res.json();
    if (!data.success || !Array.isArray(data.bookings)) return;

    const sheetBookings = data.bookings;
    const localBookings = JSON.parse(localStorage.getItem('hs_requests') || '[]');
    const sheetIds = new Set(sheetBookings.map(b => String(b.id)));
    const localOnly = localBookings.filter(b => !sheetIds.has(String(b.id)));

    const merged = sheetBookings.map(sb => {
      const local = localBookings.find(lb => String(lb.id) === String(sb.id));
      if (local) {
        return Object.assign({}, local, {
          status: sb.status,
          lineUserId: local.lineUserId || sb.lineUserId || '',
          lineId: local.lineId || sb.lineId || '',
        });
      } else {
        return sb;
      }
    });

    const final = [...merged, ...localOnly];
    // GAS側の問題でデータが0件になってもlocalを消さない
    if (final.length === 0 && localBookings.length > 0) return;
    localStorage.setItem('hs_requests', JSON.stringify(final));
    requests = final;
    updateBadge();
  } catch(e) {
    console.log('シート同期エラー（localデータを維持）:', e);
    requests = JSON.parse(localStorage.getItem('hs_requests') || '[]');
  }
}

function renderAdminCalendar() {
  settings = JSON.parse(localStorage.getItem('hs_settings') || '{"maxHours":8,"closedDates":[],"dayStatus":{}}');
  if (!settings.closedDates) settings.closedDates = [];
  if (!settings.dayStatus) settings.dayStatus = {};

  const container = document.getElementById('admin-cal-wrap');
  container.innerHTML = '';

  const dayNames = ['日','月','火','水','木','金','土'];
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const today = new Date();

  // 明日から21日分（3週）を月ごとにグループ化
  const monthMap = {};
  for (let i = 0; i <= 21; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const key = `${d.getFullYear()}-${d.getMonth()}`;
    if (!monthMap[key]) monthMap[key] = { year: d.getFullYear(), month: d.getMonth(), dates: [] };
    monthMap[key].dates.push(new Date(d));
  }

  Object.values(monthMap).forEach(({ year, month, dates }) => {
    // 月ラベル
    const mLabel = document.createElement('div');
    mLabel.className = 'cal-month-label';
    mLabel.textContent = `${year}年 ${monthNames[month]}`;
    container.appendChild(mLabel);

    // 曜日ヘッダー
    const header = document.createElement('div');
    header.className = 'cal-header';
    dayNames.forEach(n => {
      const s = document.createElement('span');
      s.textContent = n;
      header.appendChild(s);
    });
    container.appendChild(header);

    // グリッド
    const grid = document.createElement('div');
    grid.className = 'cal-grid';

    // 月初の空白
    const firstDay = new Date(year, month, 1).getDay();
    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'd-chip empty';
      grid.appendChild(empty);
    }

    // 月内の全日を埋める
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    for (let day = 1; day <= daysInMonth; day++) {
      const d = new Date(year, month, day);
      const dow = d.getDay();
      const sunCls = dow === 0 ? ' sun' : '';
      const chip = document.createElement('div');
      const label = `${d.getMonth()+1}/${d.getDate()}`;
      const isInRange = dates.some(rd => rd.getDate() === day);
      const isPast = d < new Date(today.getFullYear(), today.getMonth(), today.getDate());

      if (!isInRange || isPast) {
        // 範囲外・過去
        chip.className = `d-chip disabled${sunCls}`;
        chip.innerHTML = `<div class="d-chip-side"><div class="d-chip-side-top side-off"></div><div class="d-chip-side-bot side-off"></div></div><div class="d-chip-body"><span class="d-num">${day}</span></div>`;
      } else if (dow === 1) {
        // 月曜定休
        chip.className = `d-chip holiday${sunCls}`;
        chip.innerHTML = `<div class="d-chip-side"><div class="d-chip-side-top side-off"></div><div class="d-chip-side-bot side-off"></div></div><div class="d-chip-body"><span class="d-num">${day}</span><span class="d-name">定休日</span></div>`;
      } else if ((settings.closedDates || []).includes(label)) {
        // 休業日
        chip.className = `d-chip holiday${sunCls}`;
        chip.innerHTML = `<div class="d-chip-side"><div class="d-chip-side-top side-off"></div><div class="d-chip-side-bot side-off"></div></div><div class="d-chip-body"><span class="d-num">${day}</span><span class="d-name">定休日</span></div>`;
      } else {
        // 通常日：午前・午後それぞれタップで切り替え
        const amStatus = settings.dayStatus[label + '_am'] || settings.dayStatus[label] || 'ok';
        const pmStatus = settings.dayStatus[label + '_pm'] || settings.dayStatus[label] || 'ok';
        // ⭐ 5状態を直接色に変換（ok / ok-dim / cut / cut-dim / full）
        function st2cls2(st) {
          if (st === 'full')     return 'side-full';
          if (st === 'cut-dim')  return 'side-cut-dim';
          if (st === 'cut' || st === 'cut-only') return 'side-cut';
          if (st === 'ok-dim')   return 'side-ok-dim';
          if (st === 'ok')       return 'side-ok';
          return 'side-off';
        }
        // 表示ラベル
        function stLabel(st) {
          if (st === 'full')    return '満';
          if (st === 'cut-dim') return 'カ少';
          if (st === 'cut' || st === 'cut-only') return 'カット';
          if (st === 'ok-dim')  return '残少';
          return '空';
        }
        const amCls = st2cls2(amStatus);
        const pmCls = st2cls2(pmStatus);
        chip.className = `d-chip${sunCls}`;
        chip.style.cursor = 'pointer';
        chip.innerHTML = `
          <div class="d-chip-side" style="cursor:pointer;">
            <div class="d-chip-side-top ${amCls}" data-part="am" title="午前：タップで切替"></div>
            <div class="d-chip-side-bot ${pmCls}" data-part="pm" title="午後：タップで切替"></div>
          </div>
          <div class="d-chip-body">
            <span class="d-num">${day}</span>
            <span class="d-name" style="font-size:8px;line-height:1.3;">
              <span style="display:block;">前:${stLabel(amStatus)}</span>
              <span style="display:block;">後:${stLabel(pmStatus)}</span>
            </span>
          </div>`;
        // ⭐ 5段階サイクル：ok → ok-dim → cut → cut-dim → full → ok
        function nextStatus(cur) {
          if (cur === 'ok') return 'ok-dim';
          if (cur === 'ok-dim') return 'cut';
          if (cur === 'cut' || cur === 'cut-only') return 'cut-dim';
          if (cur === 'cut-dim') return 'full';
          return 'ok';
        }
        // 午前ラインタップ
        chip.querySelector('[data-part="am"]').onclick = (e) => {
          e.stopPropagation();
          const cur = settings.dayStatus[label + '_am'] || settings.dayStatus[label] || 'ok';
          settings.dayStatus[label + '_am'] = nextStatus(cur);
          // ⭐ 手動設定マーカーを立てる（次回同期で上書きされない）
          settings.dayStatus[label + '_manual'] = true;
          // 古い全体キーを削除して個別キーに移行
          delete settings.dayStatus[label];
          localStorage.setItem('hs_settings', JSON.stringify(settings));
          renderAdminCalendar();
          refreshDatePickerIfVisible();
        };
        // 午後ラインタップ
        chip.querySelector('[data-part="pm"]').onclick = (e) => {
          e.stopPropagation();
          const cur = settings.dayStatus[label + '_pm'] || settings.dayStatus[label] || 'ok';
          settings.dayStatus[label + '_pm'] = nextStatus(cur);
          // ⭐ 手動設定マーカーを立てる
          settings.dayStatus[label + '_manual'] = true;
          // 古い全体キーを削除して個別キーに移行
          delete settings.dayStatus[label];
          localStorage.setItem('hs_settings', JSON.stringify(settings));
          renderAdminCalendar();
          refreshDatePickerIfVisible();
        };
      }
      grid.appendChild(chip);
    }
    container.appendChild(grid);
  });
}

function renderRequests() {
  const container = document.getElementById('requests-list');
  container.innerHTML = '';
  const pending = requests.filter(r => r.status === 'pending');
  const awaiting = requests.filter(r => r.status === 'awaiting_customer');
  const done = requests.filter(r => r.status !== 'pending' && r.status !== 'awaiting_customer');

  if (requests.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>現在、予約申請はありません。</p></div>`;
    return;
  }

  if (pending.length > 0) {
    const t = document.createElement('div');
    t.className = 'section-title';
    t.textContent = `▸ 未処理（${pending.length}件）`;
    container.appendChild(t);
    pending.forEach(r => container.appendChild(makeCard(r)));
  }

  if (awaiting.length > 0) {
    const t = document.createElement('div');
    t.className = 'section-title';
    t.style.cssText = 'color:#e67e22;';
    t.textContent = `⏳ お客様確認待ち（${awaiting.length}件）`;
    container.appendChild(t);
    awaiting.forEach(r => container.appendChild(makeCard(r)));
  }

  if (done.length > 0) {
    const t = document.createElement('div');
    t.className = 'section-title';
    t.textContent = '▸ 処理済み';
    container.appendChild(t);
    done.slice(-5).reverse().forEach(r => container.appendChild(makeCard(r)));
  }
}

function makeCard(r) {
  const dur = r.duration || 60;
  const hours = Math.floor(dur/60);
  const mins = dur%60;
  const durText = hours > 0 ? `${hours}時間${mins>0?mins+'分':''}` : `${mins}分`;

  // 希望日時を行ごとに分割
  const timePrefLines = (r.timePref || r.datesStr || '').split('\n').filter(Boolean);

  // 今日から21日分の日付オプションを生成（月曜除く）
  function buildDateOptions() {
    const opts = [];
    const today = new Date();
    const days = ['日','月','火','水','木','金','土'];
    for (let i = 1; i <= 21; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      if (d.getDay() === 1) continue; // 月曜除く
      const m = d.getMonth() + 1;
      const day = d.getDate();
      const dow = days[d.getDay()];
      opts.push(`${m}/${day}(${dow})`);
    }
    return opts;
  }

  const timeOpts = [
    { value: '9:00',  label: '9:00' },
    { value: '9:30',  label: '9:30' },
    { value: '10:00', label: '10:00' },
    { value: '10:30', label: '10:30' },
    { value: '11:00', label: '11:00' },
    { value: '11:30', label: '11:30' },
    { value: '12:00', label: '12:00' },
    { value: '12:30', label: '12:30' },
    { value: '13:00', label: '13:00' },
    { value: '13:30', label: '13:30' },
    { value: '14:00', label: '14:00' },
    { value: '14:30', label: '14:30' },
    { value: '15:00', label: '15:00' },
    { value: '15:30', label: '15:30' },
    { value: '16:00', label: '16:00' },
    { value: '16:30', label: '16:30' },
    { value: '17:00', label: '17:00' },
    { value: '17:30', label: '17:30' },
    { value: '18:00', label: '18:00' },
  ];
  const timeOptsHtml = timeOpts.map(t =>
    t.disabled
      ? `<option value="" disabled>${t.label}</option>`
      : `<option value="${t.value}">${t.label}</option>`
  ).join('');

  // 選択ラジオUI（pending時のみ）
  let dateSelectHtml = '';
  // お任せ判定ヘルパー（「午前お任せ」「午後お任せ」「終日お任せ」「おまかせ」「お任せ」「指定なし」のいずれかを含む）
  const isOmakaseLine = l => l.includes('お任せ') || l.includes('おまかせ') || l.includes('指定なし') || /\d+時以降/.test(l) || /\d+:\d+以降/.test(l);

  // 「〇時以降」から最低時間を取得する関数
  function getAfterTime(line) {
    const m = line.match(/(\d+)(?::(\d+))?時以降/) || line.match(/(\d+):(\d+)以降/);
    if (!m) return null;
    const hour = parseInt(m[1]);
    const min = m[2] ? parseInt(m[2]) : 0;
    return hour * 60 + min; // 分に変換
  }

  // 「〇時以降」用にフィルタリングされたtimeOptsHtmlを生成
  function buildTimeOptsHtml(line) {
    const afterMin = getAfterTime(line);
    return timeOpts.map(t => {
      if (t.disabled) return '<option value="" disabled>' + t.label + '</option>';
      if (afterMin !== null) {
        const tParts = t.value.split(':');
        const tMin = parseInt(tParts[0]) * 60 + parseInt(tParts[1]);
        if (tMin < afterMin) return ''; // 以降より前はスキップ
      }
      return '<option value="' + t.value + '">' + t.label + '</option>';
    }).join('');
  }

  // ===== メッセージ予約：お客様のメッセージ内容を表示＋日時を管理者が入力 =====
  if (r.isDirect && r.status === 'pending') {
    const dateOpts = buildDateOptions().map(d => `<option value="${d}">${d}</option>`).join('');
    dateSelectHtml = `
      <div style="margin:4px 0 8px;padding:8px 10px;background:#fff8f0;border-radius:8px;border:1px solid rgba(139,111,71,0.25);font-size:12px;line-height:1.8;color:var(--ink);white-space:pre-line;">${r.timePref||r.datesStr||'（メッセージ内容なし）'}</div>
      <div style="margin:4px 0 4px;font-size:11px;color:var(--accent);font-weight:600;">📅 カレンダー登録する日時を選択</div>
      <div style="padding:8px;background:#faf7f3;border-radius:8px;border:1px solid rgba(139,111,71,0.2);">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <select id="custom-date-sel-${r.id}" style="flex:1;min-width:120px;padding:6px;border:1px solid rgba(139,111,71,0.3);border-radius:6px;font-size:12px;">${dateOpts}</select>
          <select id="custom-time-sel-${r.id}" style="width:110px;padding:6px;border:1px solid rgba(139,111,71,0.3);border-radius:6px;font-size:12px;">${timeOptsHtml}</select>
        </div>
      </div>`;
  } else if (r.status === 'pending' && timePrefLines.length > 0 && !timePrefLines.every(isOmakaseLine)) {
    // お客様が日時を指定してきた → 各希望日に時間ドロップダウンを追加
    const options = timePrefLines.map((line, i) => {
      const clean = line.replace(/^第\d+希望\s*/, '').replace('：', ' ');
      // お任せ行は時間ドロップダウンを表示、時間指定ありはそのまま表示
      const needsTime = isOmakaseLine(line);
      return `<div style="padding:7px 10px;border:1px solid rgba(139,111,71,0.25);border-radius:8px;margin-bottom:5px;background:white;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;">
          <input type="radio" name="date_${r.id}" value="${line}" ${i===0?'checked':''} style="accent-color:var(--accent);">
          <span>${clean}</span>
        </label>
        ${needsTime ? `<select id="time-sel-${r.id}-${i}" style="margin-top:6px;width:100%;padding:6px;border:1px solid rgba(139,111,71,0.3);border-radius:6px;font-size:12px;">${buildTimeOptsHtml(line)}</select>` : ''}
      </div>`;
    }).join('');
    dateSelectHtml = `
      <div style="margin:8px 0 4px;font-size:11px;color:var(--muted);font-weight:500;">希望日時を選択して承認</div>
      ${options}`;
  } else if (r.status === 'pending' && timePrefLines.length > 0 && timePrefLines.some(isOmakaseLine)) {
    // 日付指定あり・時間おまかせ → 全希望日を表示して日付と時間を選択
    const dateOpts = timePrefLines.map((line, i) => {
      // 日付部分を抽出（「第1希望 4/25(金)：午前お任せ」→「4/25(金)」）
      const datePart = line.replace(/^第\d+希望\s*/, '').replace(/[：:].*/,'').trim();
      const label = line.replace(/^第\d+希望\s*/, '');
      return `<option value="${datePart}">${i+1}番目：${label}</option>`;
    }).join('');
    dateSelectHtml = `
      <div style="margin:8px 0 4px;font-size:11px;color:var(--accent);font-weight:600;">📅 時間をご指定ください</div>
      <div style="padding:8px;background:#faf7f3;border-radius:8px;border:1px solid rgba(139,111,71,0.2);">
        <div style="font-size:12px;color:var(--ink);margin-bottom:8px;">希望日：</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <select id="custom-date-sel-${r.id}" style="flex:1;min-width:120px;padding:6px;border:1px solid rgba(139,111,71,0.3);border-radius:6px;font-size:12px;">${dateOpts}</select>
          <select id="custom-time-sel-${r.id}" style="width:110px;padding:6px;border:1px solid rgba(139,111,71,0.3);border-radius:6px;font-size:12px;">${timeOptsHtml}</select>
        </div>
      </div>`;
  } else if (r.status === 'pending') {
    // 完全お任せ（希望日時なし）の場合
    const dateOpts = buildDateOptions().map(d => `<option value="${d}">${d}</option>`).join('');
    dateSelectHtml = `
      <div style="margin:8px 0 4px;font-size:11px;color:var(--accent);font-weight:600;">📅 日時をご指定ください（お任せ）</div>
      <div style="padding:8px;background:#faf7f3;border-radius:8px;border:1px solid rgba(139,111,71,0.2);">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <select id="custom-date-sel-${r.id}" style="flex:1;min-width:120px;padding:6px;border:1px solid rgba(139,111,71,0.3);border-radius:6px;font-size:12px;">${dateOpts}</select>
          <select id="custom-time-sel-${r.id}" style="width:110px;padding:6px;border:1px solid rgba(139,111,71,0.3);border-radius:6px;font-size:12px;">${timeOptsHtml}</select>
        </div>
      </div>`;
  } else {
    dateSelectHtml = `<span class="val" style="font-size:11px;line-height:1.8;white-space:pre-line">${r.timePref||r.datesStr||'-'}</span>`;
  }

  const menuList = ['カット','カット&シャンプー','カット＋カラー','カット＋パーマ','パーマ＋カラー','カット＋縮毛矯正','カット＋トリートメント','カラーのみ','トリートメントのみ','__other__'];
  const menuOptions = menuList.map(m => {
    if (m === '__other__') return `<option value="__other__">✏️ その他（直接入力）</option>`;
    return `<option value="${m}" ${(r.cutMenu||'').includes(m.split('＋')[0]) && (r.cutMenu===m)?'selected':''}>${m}</option>`;
  }).join('');

  const el = document.createElement('div');
  el.className = `req-card ${r.status}`;
  if (r.isNew) el.style.background = '#f8f6ff';
  el.id = `card-${r.id}`;
  el.innerHTML = `
    <div class="req-header">
      <div>
        <div class="req-name">${r.name} 様</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px">${r.createdAt}</div>
      </div>
      <span class="req-type ${r.isNew?'new':'regular'}">${r.isNew?'新規':'ご来店歴あり'}</span>
    </div>
    <div class="req-meta">
      <div class="req-meta-item"><span class="lbl">カットメニュー</span><span class="val">${r.cutMenu||'なし'}${r.cutType?' / '+r.cutType:''}</span></div>
      <div class="req-meta-item"><span class="lbl">髪の長さ</span><span class="val">${r.hairLength||'-'}</span></div>
      <div class="req-meta-item"><span class="lbl">オプション</span><span class="val">${r.options&&r.options.length?r.options.join('・'):'なし'}</span></div>
      ${r.lineId?`<div class="req-meta-item"><span class="lbl">LINE名</span><span class="val">${r.lineId}${r.lineUserId?'<br><span style="font-size:10px;color:var(--muted);">ID: '+r.lineUserId+'</span>':''}</span></div>`:''}
      ${r.permType?`<div class="req-meta-item"><span class="lbl">パーマ種類</span><span class="val">${r.permType}${r.permDetail?' / '+r.permDetail:''}</span></div>`:''}
      ${r.colorType?`<div class="req-meta-item"><span class="lbl">カラー種類</span><span class="val">${r.colorType}${r.colorDetail?' / '+r.colorDetail:''}</span></div>`:''}
      <div class="req-meta-item" style="grid-column:1/-1"><span class="lbl">希望日時</span>${dateSelectHtml}</div>
      ${r.status==='pending' ? `
      <div class="req-meta-item" style="grid-column:1/-1">
        <span class="lbl" style="color:var(--accent);font-weight:600;">✏️ 施術メニュー（こちらで確定）</span>
        <select id="menu-sel-${r.id}" onchange="toggleMenuOther(${r.id})" style="margin-top:4px;width:100%;padding:7px 10px;border:1px solid rgba(139,111,71,0.35);border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;background:white;color:var(--ink);">
          ${menuOptions}
        </select>
        <input type="text" id="menu-other-${r.id}" placeholder="メニューを入力してください" style="display:none;margin-top:6px;width:100%;padding:7px 10px;border:1px solid rgba(139,111,71,0.35);border-radius:8px;font-size:16px;font-family:'DM Sans',sans-serif;box-sizing:border-box;">
      </div>` : ''}
    </div>
    ${r.counseling||r.notes ? `<div class="req-notes"><span class="lbl">カウンセリング・備考</span>${r.counseling||''}${r.notes?' / '+r.notes:''}</div>` : ''}
    <div class="ai-summary">${r.aiNote||''}</div>
    ${r.status==='pending' ? `
      <div class="req-actions">
        <button class="btn-approve" onclick="approveWithDate(${r.id})">✓ 承認・カレンダー登録</button>
        <button class="btn-reject" onclick="reject(${r.id})">✕ 断る</button>
      </div>` : `
      <div style="text-align:right;display:flex;gap:8px;justify-content:flex-end;align-items:center;">
        <span class="status-pill ${r.status}">${r.status==='approved'?'✓ 承認済み':r.status==='awaiting_customer'?'⏳ お客様確認待ち':'✕ 断り済み'}</span>
        ${r.status !== 'awaiting_customer' ? `<button onclick="copyReplyMessage(${r.id},'${r.status}')" style="padding:6px 12px;border-radius:8px;border:1px solid rgba(139,111,71,0.3);background:rgba(139,111,71,0.07);color:var(--accent);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;">📋 返信メッセージをコピー</button>` : ''}
        ${r.lineUserId ? `<button onclick="openSendMessageModal(${r.id})" style="padding:6px 12px;border-radius:8px;border:1px solid rgba(76,175,80,0.3);background:rgba(76,175,80,0.07);color:#4CAF50;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;">💬 LINEで送信</button>` : ''}
        <button onclick="deleteReqCard(${r.id})" style="padding:6px 12px;border-radius:8px;border:1px solid rgba(184,90,90,0.3);background:rgba(184,90,90,0.06);color:var(--danger);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;">🗑 削除</button>
      </div>`}
  `;

  // 「こちらで指定」ラジオ選択時の表示切り替え
  setTimeout(() => {
    const radios = el.querySelectorAll(`input[name="date_${r.id}"]`);
    const customBox = el.querySelector(`#custom-date-${r.id}`);
    radios.forEach(radio => {
      radio.addEventListener('change', () => {
        if (customBox) customBox.style.display = radio.value === '__custom__' ? 'block' : 'none';
      });
    });
  }, 0);

  return el;
}

// ⚠️ 重要：Admin.gs をデプロイした「ウェブアプリのURL」を貼り付けてください
//   1. Apps Scriptエディタで「デプロイ」→「新しいデプロイ」

//   4. Admin.gs を変更したら必ず「デプロイの管理」→新バージョンを作成
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyWRsrMpC7QviWJae68AFE7VWFkM3YCq9nLKj-UUvrbLIAhA473JuOGXKJ_i3awEiphzQ/exec';

// オーナーへのLINE通知
function sendLineNotify(type, data) {
  if (!GAS_URL) return;
  let message = '';
  if (type === 'new_booking') {
    const optText = (data.options && data.options.length) ? data.options.join('・') : 'なし';
    message = `📅【新規予約申請】\n\nお名前：${data.name} 様（${data.isNew ? '新規' : 'ご来店歴あり'}）\nメニュー：${data.cutMenu || 'なし'}${optText !== 'なし' ? '＋' + optText : ''}\n希望日時：${data.timePref || data.datesStr || '未設定'}\n申請日時：${data.createdAt}\n\n管理画面でご確認ください。`;
  } else if (type === 'cancelled') {
    message = `❌【予約キャンセル】\n\nお名前：${data.name} 様\nメニュー：${data.cutMenu || 'なし'}\n日時：${data.timePref || data.datesStr || '未設定'}\n\n予約がキャンセルされました。`;
  } else if (type === 'direct_message') {
    message = `💬【メッセージ予約】\n\nお名前：${data.name} 様（${data.isNew ? '新規' : 'ご来店歴あり'}）\nメッセージ：${data.timePref || data.datesStr || ''}\n申請日時：${data.createdAt}\n\n管理画面でご確認ください。`;
  }
  fetch(GAS_URL, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ type: 'notify_owner', message, data }),
  }).catch(e => console.log('LINE通知エラー:', e));
}

// ============================================================
// スプレッドシートからカレンダー設定を取得（休業日・午前午後の手動設定）
// ⭐ 管理画面で設定した内容をお客様画面に反映するための関数
// ============================================================
async function syncSettingsFromSheet(force = false) {
  if (!GAS_URL || GAS_URL === 'YOUR_GAS_URL_HERE') {
    console.log('🔴 GAS_URL未設定');
    return;
  }

  // 5分以内のキャッシュがあればスキップ（強制フラグなし時）
  if (!force) {
    const lastFetch = parseInt(localStorage.getItem('hs_settings_last_fetch') || '0');
    if (Date.now() - lastFetch < 5 * 60 * 1000) {
      console.log('⏭️ 設定取得スキップ（キャッシュ有効）');
      return;
    }
  }

  console.log('🔵 syncSettingsFromSheet 開始:', GAS_URL + '?action=getSettings');
  try {
    const res = await fetch(`${GAS_URL}?action=getSettings`);
    console.log('🔵 レスポンスstatus:', res.status, res.ok);
    const json = await res.json();
    console.log('🔵 受信データ:', JSON.stringify(json).substring(0, 500));
    if (json.success && json.settings) {
      // 既存のlocalStorageを土台に、シートの内容で上書き
      const local = JSON.parse(localStorage.getItem('hs_settings') || '{"maxHours":8,"closedDates":[],"dayStatus":{}}');
      const merged = Object.assign({}, local, json.settings);
      // dayStatusとclosedDatesはシート側を「正」として完全置換
      merged.dayStatus = json.settings.dayStatus || {};
      merged.closedDates = json.settings.closedDates || [];
      settings = merged;
      localStorage.setItem('hs_settings', JSON.stringify(settings));
      localStorage.setItem('hs_settings_last_fetch', Date.now().toString());
      console.log('✅ 設定同期完了:');
      console.log('   - dayStatus件数:', Object.keys(settings.dayStatus||{}).length);
      console.log('   - 休業日件数:', (settings.closedDates||[]).length);
      console.log('   - dayStatusサンプル:', JSON.stringify(settings.dayStatus).substring(0, 300));
    } else {
      console.log('🔴 設定取得失敗:', json);
    }
  } catch (e) {
    console.log('🔴 設定同期エラー:', e.message);
  }
}

// ============================================================
// Googleカレンダーから空き枠を取得してカレンダー色を自動更新
// ============================================================
async function syncCalendarStatus(force = false) {
  if (!GAS_URL || GAS_URL === 'YOUR_GAS_URL_HERE') return;

  // ⭐ まずシートの手動設定（休業日・午前午後の固定）を取得
  await syncSettingsFromSheet(force);

  // 5分以内のキャッシュがあればスキップ（強制フラグなし時）
  if (!force) {
    const lastSync = parseInt(localStorage.getItem('hs_last_sync') || '0');
    if (Date.now() - lastSync < 5 * 60 * 1000) {
      console.log('カレンダー同期スキップ（キャッシュ有効）');
      return;
    }
  }

  try {
    // 28日分取得（カレンダー表示が4週間=28日のため）
    const res = await fetch(`${GAS_URL}?action=getStatus&days=28`, { redirect: 'follow' });
const text = await res.text();
const json = JSON.parse(text);
    if (json.success && json.status) {
      if (!settings.dayStatus) settings.dayStatus = {};
      // ⭐ Googleカレンダー由来のステータスを反映
      //    手動設定マーカー（_manual キー）が立っている日付だけは保護
      Object.keys(json.status).forEach(key => {
        // _am / _pm キーから日付部分を抜き出す
        const dateBase = key.replace(/_am$|_pm$/, '');
        const isManual = settings.dayStatus[dateBase + '_manual'] === true;
        if (!isManual) {
          settings.dayStatus[key] = json.status[key];
        }
      });
      localStorage.setItem('hs_settings', JSON.stringify(settings));
      localStorage.setItem('hs_last_sync', Date.now().toString());
      if (typeof renderAdminCalendar === 'function') {
        try { renderAdminCalendar(); } catch(e) {}
      }
      if (typeof updateAdminCalendarLastSync === 'function') {
        try { updateAdminCalendarLastSync(); } catch(e) {}
      }
      // ⭐ お客様用カレンダーも再描画
      if (typeof refreshCustomerCalendar === 'function') {
        try { refreshCustomerCalendar(); } catch(e) {}
      }
      console.log('カレンダーステータス同期完了:', Object.keys(json.status).length + '件 反映');
    } else {
      console.log('同期失敗:', json);
    }
  } catch (e) {
    console.log('カレンダー同期エラー:', e);
  }
}

async function syncAndRefresh() {
  const btn = document.getElementById('sync-cal-btn');
  if (btn) { btn.textContent = '⏳ 同期中...'; btn.disabled = true; }
  await syncCalendarStatus(true);
  refreshCustomerCalendar();
  if (btn) {
    btn.textContent = '✅ 同期・反映完了！';
    btn.disabled = false;
    setTimeout(() => { updateAdminCalendarLastSync(); }, 2000);
  }
}

function updateAdminCalendarLastSync() {
  const btn = document.getElementById('sync-cal-btn');
  if (!btn) return;
  const lastSync = parseInt(localStorage.getItem('hs_last_sync') || '0');
  if (!lastSync) { btn.textContent = '📅 Googleカレンダーと同期して空き枠を更新'; return; }
  const d = new Date(lastSync);
  const h = d.getHours().toString().padStart(2,'0');
  const m = d.getMinutes().toString().padStart(2,'0');
  btn.textContent = `📅 Googleカレンダーと同期する（最終更新 ${h}:${m}）`;
}

function approveWithDate(id) {
  const r = requests.find(x => String(x.id) === String(id));
  if (!r) { console.warn('[ERROR] approveWithDate: id not found:', id, requests.map(x=>x.id)); return; }
  const card = document.getElementById(`card-${id}`);

  // メニュー選択を保存（メッセージ予約はドロップダウン選択値を必ず使う）
  const menuSel = card ? card.querySelector(`#menu-sel-${id}`) : null;
  const menuOther = card ? card.querySelector(`#menu-other-${id}`) : null;
  if (menuSel && menuSel.value === '__other__') {
    // テキスト入力値を使う
    r.menu = (menuOther && menuOther.value.trim()) ? menuOther.value.trim() : 'その他';
  } else if (menuSel && menuSel.value) {
    r.menu = menuSel.value;
  } else if (menuSel && r.cutMenu === 'メッセージ予約') {
    // 未選択の場合は最初の選択肢をデフォルトに
    r.menu = menuSel.options[0] ? menuSel.options[0].value : 'カット';
  }

  // 選択されたラジオボタンの日時を取得
  const selected = card ? card.querySelector(`input[name="date_${id}"]:checked`) : null;
  let resolvedDate = '';
  if (selected && selected.value === '__custom__') {
    const dateSel = card.querySelector(`#custom-date-sel-${id}`);
    const timeSel = card.querySelector(`#custom-time-sel-${id}`);
    if (dateSel && timeSel) {
      resolvedDate = `${dateSel.value} ${timeSel.value}`;
    }
  } else if (selected) {
    // お任せ行の場合は同じdiv内の時間ドロップダウンを探す
    const parentDiv = selected.closest('div[style]');
    const isOmakase = selected.value.includes('お任せ') || selected.value.includes('おまかせ') || selected.value.includes('指定なし');
    if (isOmakase && parentDiv) {
      // ラジオボタンのインデックスを取得
      const allRadios = card.querySelectorAll(`input[name="date_${id}"]`);
      let radioIndex = 0;
      allRadios.forEach((radio, i) => { if (radio === selected) radioIndex = i; });
      const timeSel = card.querySelector(`#time-sel-${id}-${radioIndex}`);
      if (timeSel) {
        const datePart = selected.value.replace(/^第\d+希望\s*/, '').replace(/[：:].*/,'').trim();
        resolvedDate = `${datePart} ${timeSel.value}`;
      } else {
        resolvedDate = selected.value;
      }
    } else {
      resolvedDate = selected.value;
    }
  } else {
    const dateSel = card ? card.querySelector(`#custom-date-sel-${id}`) : null;
    const timeSel = card ? card.querySelector(`#custom-time-sel-${id}`) : null;
    if (dateSel && timeSel) {
      resolvedDate = `${dateSel.value} ${timeSel.value}`;
    }
  }

  // 希望日の件数を判定
  const origTimePref = r.timePref || r.datesStr || '';
  const prefLines = origTimePref.split('\n').filter(Boolean);
  const isOmakaseAll = prefLines.length === 0 || prefLines.every(l => l.includes('お任せ') || l.includes('おまかせ') || l.includes('指定なし'));
  const isSingleDate = !r.isDirect && prefLines.length === 1 && !isOmakaseAll;
  console.log('[DEBUG] origTimePref:', JSON.stringify(origTimePref));
  console.log('[DEBUG] prefLines:', prefLines, 'length:', prefLines.length);
  console.log('[DEBUG] isOmakaseAll:', isOmakaseAll, 'isSingleDate:', isSingleDate, 'isDirect:', r.isDirect);
  console.log('[DEBUG] resolvedDate:', resolvedDate);

  if (resolvedDate && isSingleDate) {
    // 希望日が1つ → 確認モーダルなし・直接カレンダー登録＋確定メッセージ
    r.selectedDate = resolvedDate;
    r.timePref = resolvedDate;
    r.status = 'approved';
    localStorage.setItem('hs_requests', JSON.stringify(requests));
    sendToGoogleCalendar(r);
    showToast(`${r.name}様の予約を確定しました！`);
    updateBadge();
    renderAdminLocal();
    showConfirmedMessage(r);
    // タブをお客様側に切り替え
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('customer-page').classList.add('active');
    document.querySelector('.tab-btn').classList.add('active');
  } else if (resolvedDate) {
    // 希望日が複数 or お任せ or メッセージ予約 → 確認モーダル経由
    showLineConfirmModal(id, r, resolvedDate);
  } else {
    // 日時未確定（完全お任せ）
    _doApproveWithDate(id, r, resolvedDate);
  }
}

// 実際の承認処理（お任せの場合はお客様確認待ちステータスに）
function _doApproveWithDate(id, r, resolvedDate) {
  if (!r) r = requests.find(x => String(x.id) === String(id));
  if (!r) return;

  if (resolvedDate) {
    r.selectedDate = resolvedDate;
    r.timePref = resolvedDate;
  }

  // 日時提案 → お客様確認待ちステータスへ
  r.status = 'awaiting_customer';
  r.proposedDate = resolvedDate || r.timePref;
  localStorage.setItem('hs_requests', JSON.stringify(requests));
  showToast(`${r.name}様へ日時を提案しました。お客様の確認をお待ちください`);
  updateBadge();
  renderAdminLocal();
  // お客様チャット側に確認ボタン付きメッセージを表示
  showProposalMessage(r);
}

  let dateText = rawTime.replace(/^第\d+希望\s*/, '').replace('：午前 ', ' ').replace('：午後 ', ' ').replace('：おまかせ', ' 時間はおまかせ').replace('：', ' ');

  }

// お客様が承諾後 → 確定メッセージをチャットに追加
function showConfirmedMessage(r) {
  const chat = document.getElementById('chat');
  if (!chat) return;

  const rawTime = (r.timePref || '').split('\n')[0];
  let dateText = rawTime.replace(/^第\d+希望\s*/, '').replace('：午前 ', ' ').replace('：午後 ', ' ').replace('：おまかせ', ' 時間はおまかせ').replace('：', ' ');
  const menuParts = [];
  if (r.menu && r.menu !== 'メッセージ予約') {
    menuParts.push(r.menu);
  } else if (r.cutMenu && r.cutMenu !== 'カット無し（オプションのみ）' && r.cutMenu !== 'メッセージ予約') {
    menuParts.push(r.cutMenu.replace('カット＋追加メニュー', 'カット'));
    if (r.options && r.options.length) menuParts.push(...r.options.filter(o => o !== 'その他'));
  }
  const menuText = menuParts.length ? menuParts.join('・') : 'ご確認ください';

  // まずお客様の「承諾します」発言を追加
  const userMsg = document.createElement('div');
  userMsg.className = 'msg user';
  userMsg.innerHTML = `<div class="bubble">✅ この日時で承諾します</div>`;
  chat.appendChild(userMsg);

  // 確定メッセージ
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  const av = document.createElement('div');
  av.className = 'av ai';
  const existingAvImg = document.querySelector('.av.ai img');
  if (existingAvImg) {
    av.innerHTML = existingAvImg.outerHTML;
  } else {
    av.textContent = 'ONE';
    av.style.cssText = 'width:32px;height:32px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:10px;font-weight:700;flex-shrink:0;';
  }
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = `<div style="line-height:2;white-space:pre-line;font-size:13px;">【ご予約確定のご連絡】
ご予約ありがとうございます😊
下記の内容でご予約を承りました。

📅 日時：${dateText}
💇 メニュー：${menuText}

当日はお気をつけてお越しくださいませ✂️
よろしくお願い致します🌿</div>`;
  wrap.appendChild(av);
  wrap.appendChild(bub);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;

  // LINE送信
  const msgText = `【ご予約確定のご連絡】\nご予約ありがとうございます😊\n下記の内容でご予約を承りました。\n\n📅 日時：${dateText}\n💇 メニュー：${menuText}\n\n当日はお気をつけてお越しくださいませ✂️\nよろしくお願い致します🌿`;

  if (typeof liffReady !== 'undefined' && liffReady && liff.isInClient()) {
    // LINEアプリ内からの場合：LIFF経由で送信
    liff.sendMessages([{ type: 'text', text: msgText }])
      .then(() => showToast('LINEにメッセージを送信しました'))
      .catch(e => console.warn('LINE送信失敗:', e));
  } else if (r.lineUserId && typeof GAS_URL !== 'undefined' && GAS_URL) {
    // ブラウザ管理画面 + lineUserId あり：GAS経由でプッシュ送信
    fetch(GAS_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ type: 'push_to_customer', userId: r.lineUserId, message: msgText }),
    }).then(() => showToast('LINEにメッセージを送信しました📤'))
      .catch(e => console.warn('LINE自動返信失敗:', e));
  } else {
    // lineUserId なし：クリップボードにコピーして手動送信を促す
    try { navigator.clipboard.writeText(msgText); } catch(e) {}
    showToast('メッセージをコピーしました。LINEで手動送信してください📋');
  }
}

function addDummyData() {
  const names = ['田中 花子', '山田 太郎', '佐藤 美咲', '鈴木 健二', '中村 さくら', '小林 陽子', '加藤 誠', '伊藤 ゆみ'];
  const menus = [
    { cutMenu: 'カット', cutType: '大人', options: [], duration: 60 },
    { cutMenu: 'カット&シャンプー', cutType: '大人', options: [], duration: 75 },
    { cutMenu: 'カット＋追加メニュー', cutType: '大人', options: ['カラー'], colorType: 'おしゃれ染め', duration: 120 },
    { cutMenu: 'カット＋追加メニュー', cutType: '大人', options: ['パーマ'], permType: 'ノーマルパーマ', duration: 150 },
    { cutMenu: 'カット＋追加メニュー', cutType: '大人', options: ['縮毛矯正'], duration: 180 },
    { cutMenu: 'カット', cutType: 'キッズ（小学生以下）', options: [], duration: 45 },
    { cutMenu: 'カット＋追加メニュー', cutType: '大人', options: ['トリートメント'], duration: 90 },
  ];
  const times = ['9:00', '10:00', '11:00', '13:00', '14:00', '15:00', '16:00'];

  const today = new Date();
  let added = 0;

  for (let i = 0; i <= 6; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    if (d.getDay() === 1) continue; // 月曜スキップ

    const dateLabel = `${d.getMonth()+1}/${d.getDate()}`;
    const days = ['日','月','火','水','木','金','土'];
    const dayStr = days[d.getDay()];

    // その日に1〜3件のダミー予約を追加
    const count = Math.floor(Math.random() * 3) + 1;
    const usedTimes = [];

    for (let j = 0; j < count; j++) {
      const name = names[Math.floor(Math.random() * names.length)];
      const menu = menus[Math.floor(Math.random() * menus.length)];
      let time = times[Math.floor(Math.random() * times.length)];
      if (usedTimes.includes(time)) continue;
      usedTimes.push(time);

      const req = {
        id: Date.now() + Math.random(),
        name,
        lineId: '',
        isNew: Math.random() > 0.5,
        status: 'approved',
        isDummy: true,
        cutMenu: menu.cutMenu,
        cutType: menu.cutType,
        options: menu.options,
        colorType: menu.colorType || '',
        permType: menu.permType || '',
        duration: menu.duration,
        date: dateLabel,
        timePref: `第1希望 ${dateLabel}(${dayStr})：午後 ${time}`,
        datesStr: dateLabel,
        notes: '',
        createdAt: new Date().toLocaleString('ja-JP'),
        aiNote: `ダミーデータ`
      };
      requests.push(req);
      added++;
    }
  }

  localStorage.setItem('hs_requests', JSON.stringify(requests));
  showToast(`ダミーデータを${added}件追加しました`);
  updateBadge();
  renderAdmin();
  refreshDatePickerIfVisible();
}

function clearDummyData() {
  requests = requests.filter(r => !r.isDummy);
  localStorage.setItem('hs_requests', JSON.stringify(requests));
  showToast('ダミーデータを削除しました');
  updateBadge();
  renderAdmin();
  refreshDatePickerIfVisible();
}

function refreshDatePickerIfVisible() {
  // date-picker-wrapが存在する場合のみ更新
  const existing = document.getElementById('date-picker-wrap');
  if (!existing) return;
  // 最新settings読み込み
  settings = JSON.parse(localStorage.getItem('hs_settings') || '{"maxHours":8,"closedDates":[],"dayStatus":{}}');
  if (!settings.closedDates) settings.closedDates = [];
  if (!settings.dayStatus) settings.dayStatus = {};
  // 選択状態を保存してカレンダーを再生成
  const savedLabels = selectedDates.map(d => d.label);
  existing.remove();
  selectedDates = [];
  showDatePicker();
  // 選択状態を復元
  setTimeout(() => {
    savedLabels.forEach(lbl => {
      const chip = document.querySelector(`#date-picker-wrap .d-chip[data-label="${lbl}"]`);
      if (chip && typeof chip.onclick === 'function') chip.click();
    });
