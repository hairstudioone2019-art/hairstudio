}

function refreshCustomerCalendar() {
  // settingsを最新化
  settings = JSON.parse(localStorage.getItem('hs_settings') || '{"maxHours":8,"closedDates":[],"dayStatus":{}}');
  if (!settings.closedDates) settings.closedDates = [];
  if (!settings.dayStatus) settings.dayStatus = {};

  const existing = document.getElementById('date-picker-wrap');

  if (!existing) {
    // カレンダーがまだ表示されていない場合
    showToast('設定を保存しました。次にカレンダーを開いた時に反映されます');
    return;
  }

  if (step !== 'date') {
    // カレンダー以外のステップにいる場合
    showToast('設定を保存しました。カレンダーを開いた時に反映されます');
    return;
  }

  // カレンダーが表示中の場合は再生成
  const savedLabels = selectedDates.map(d => d.label);
  existing.remove();
  selectedDates = [];
  showDatePicker();

  setTimeout(() => {
    savedLabels.forEach(lbl => {
      const chip = document.querySelector(`#date-picker-wrap .d-chip[data-label="${lbl}"]`);
      if (chip && typeof chip.onclick === 'function') chip.click();
    });
    showToast('お客様カレンダーを更新しました ✓');
  }, 150);
}

function addClosedDate() {
  const input = document.getElementById('closed-date-input');
  if (!input.value) return;
  const parts = input.value.split('-');
  const m = parseInt(parts[1], 10);
  const day = parseInt(parts[2], 10);
  const label = `${m}/${day}`;
  if (!settings.closedDates.includes(label)) {
    settings.closedDates.push(label);
    settings.closedDates.sort();
    localStorage.setItem('hs_settings', JSON.stringify(settings));
    showToast(`${label} を休業日に設定しました`);
  }
  input.value = '';
  renderClosedDates();
  renderAdminCalendar();
  refreshDatePickerIfVisible();
}

function removeClosedDate(label) {
  settings.closedDates = settings.closedDates.filter(d => d !== label);
  localStorage.setItem('hs_settings', JSON.stringify(settings));
  showToast(`${label} の休業日を解除しました`);
  renderClosedDates();
  renderAdminCalendar();
  refreshDatePickerIfVisible();
}

function renderClosedDates() {
  const el = document.getElementById('closed-dates-list');
  if (!el) return;
  if (!settings.closedDates.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--muted);">臨時休業日はありません</div>';
    return;
  }
  el.innerHTML = '';
  const days = ['日','月','火','水','木','金','土'];
  settings.closedDates.forEach(label => {
    const parts = label.split('/');
    const now = new Date();
    const d = new Date(now.getFullYear(), parseInt(parts[0])-1, parseInt(parts[1]));
    // 年をまたぐ場合の補正
    if (d < now) d.setFullYear(now.getFullYear() + 1);
    const dayName = days[d.getDay()];
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:rgba(184,90,90,0.06);border-radius:8px;margin-bottom:5px;';
    row.innerHTML = `
      <span style="font-size:13px;color:var(--ink);">${label}（${dayName}）</span>
      <button onclick="removeClosedDate('${label}')"
        style="border:none;background:transparent;color:var(--danger);font-size:12px;cursor:pointer;padding:2px 8px;border-radius:6px;border:1px solid rgba(184,90,90,0.3);">
        解除
      </button>`;
    el.appendChild(row);
  });
}

function switchAdminTab(tab) {
  document.getElementById('admin-tab-booking').style.display = tab === 'booking' ? 'block' : 'none';
  document.getElementById('admin-tab-customers').style.display = tab === 'customers' ? 'block' : 'none';
  document.getElementById('atab-booking').style.cssText = `flex:1;padding:10px;border:none;background:none;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;${tab==='booking'?'color:var(--accent);border-bottom:2px solid var(--accent);margin-bottom:-2px;font-weight:500;':'color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;'}`;
  document.getElementById('atab-customers').style.cssText = `flex:1;padding:10px;border:none;background:none;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;${tab==='customers'?'color:var(--accent);border-bottom:2px solid var(--accent);margin-bottom:-2px;font-weight:500;':'color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;'}`;
  if (tab === 'customers') renderCustomers();
}

function renderCustomers() {
  const container = document.getElementById('customers-list');
  if (!container) return;
  const all = JSON.parse(localStorage.getItem('hs_requests') || '[]');
  const seen = new Set();
  const customers = all.filter(r => {
    if (seen.has(r.name)) return false;
    seen.add(r.name);
    return true;
  });
  if (customers.length === 0) {
    container.innerHTML = '<div style="font-size:13px;color:var(--muted);padding:20px 0;text-align:center;">データがありません</div>';
    return;
  }
  container.innerHTML = '';
  customers.forEach(r => {
    const visits = all.filter(x => x.name === r.name).length;
    const approved = all.filter(x => x.name === r.name && x.status === 'approved').length;
    const el = document.createElement('div');
    el.style.cssText = `background:${r.isNew ? '#f8f6ff' : 'white'};border:1px solid ${r.isNew ? 'rgba(139,111,200,0.15)' : 'rgba(139,111,71,0.1)'};border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;`;

    // 左側（クリックで予約管理に飛ぶ）
    const left = document.createElement('div');
    left.style.cssText = 'flex:1;';
    left.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
        <span style="font-size:14px;color:var(--ink);font-weight:500;">${r.name} 様</span>
        <span style="font-size:10px;padding:2px 7px;border-radius:10px;background:${r.isNew ? 'rgba(139,111,200,0.12)' : 'rgba(139,111,71,0.1)'};color:${r.isNew ? '#7b5fc0' : 'var(--accent)'};">${r.isNew ? '新規' : 'ご来店歴あり'}</span>
      </div>
      <div style="font-size:11px;color:var(--muted);">申請 ${visits}件　承認済 ${approved}件${r.lineId ? `　LINE: ${r.lineId}` : ''}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px;">タップで予約一覧へ →</div>
    `;
    left.onclick = () => {
      switchAdminTab('booking');
      // renderRequests完了後にジャンプ
      setTimeout(() => {
        const cards = document.querySelectorAll('.req-card');
        let found = false;
        cards.forEach(c => {
          c.style.outline = '';
          c.style.transition = '';
        });
        cards.forEach(c => {
          const nameEl = c.querySelector('.req-name');
          if (nameEl && nameEl.textContent.includes(r.name)) {
            found = true;
            c.style.outline = '2.5px solid var(--accent)';
            c.style.transition = 'outline 0.3s';
            c.scrollIntoView({ behavior: 'smooth', block: 'center' });
            setTimeout(() => { c.style.outline = ''; }, 2500);
          }
        });
        if (!found) showToast(`${r.name}様の予約申請が見つかりません`);
      }, 400);
    };

    // チェックボックス
    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chk.dataset.name = r.name;
    chk.style.cssText = 'width:17px;height:17px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;';
    chk.onclick = (e) => { e.stopPropagation(); updateDeleteBtn(); };

    // 削除ボタン（個別）
    const delBtn = document.createElement('button');
    delBtn.textContent = '削除';
    delBtn.style.cssText = 'padding:5px 10px;border-radius:7px;border:1px solid rgba(184,90,90,0.3);background:rgba(184,90,90,0.06);color:var(--danger);font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;';
    delBtn.onclick = (e) => {
      e.stopPropagation();
      // confirmの代わりにインライン確認
      if (delBtn.dataset.confirm === '1') {
        let all2 = JSON.parse(localStorage.getItem('hs_requests') || '[]');
        all2 = all2.filter(x => x.name !== r.name);
        requests = all2;
        localStorage.setItem('hs_requests', JSON.stringify(all2));
        showToast(`${r.name}様のデータを削除しました`);
        updateBadge();
        renderCustomers();
      } else {
        delBtn.dataset.confirm = '1';
        delBtn.textContent = '確認→削除';
        delBtn.style.background = 'rgba(184,90,90,0.15)';
        setTimeout(() => {
          delBtn.dataset.confirm = '0';
          delBtn.textContent = '削除';
          delBtn.style.background = 'rgba(184,90,90,0.06)';
        }, 2500);
      }
    };

    el.appendChild(chk);
    el.appendChild(left);
    el.appendChild(delBtn);
    container.appendChild(el);
  });
}

function updateDeleteBtn() {
  const checked = document.querySelectorAll('#customers-list input[type=checkbox]:checked');

  if (btn) btn.style.display = checked.length > 0 ? '' : 'none';

function toggleSelectAll() {
  const checkboxes = document.querySelectorAll('#customers-list input[type=checkbox]');
  const allChecked = Array.from(checkboxes).every(c => c.checked);
  checkboxes.forEach(c => { c.checked = !allChecked; });

  if (btn) btn.textContent = allChecked ? '☐ 全選択' : '☑ 全解除';

function deleteSelected() {
  const checked = document.querySelectorAll('#customers-list input[type=checkbox]:checked');
  if (checked.length === 0) return;
  const names = Array.from(checked).map(c => c.dataset.name);
  if (!confirm(names.map(n => n + '様').join('、') + 'のデータを削除しますか？')) return;
  let all = JSON.parse(localStorage.getItem('hs_requests') || '[]');
  const targets2 = all.filter(x => names.includes(x.name));
  all = all.filter(x => !names.includes(x.name));
  requests = all;
  localStorage.setItem('hs_requests', JSON.stringify(all));
  targets2.forEach(r => deleteBookingFromSheet(r.id));
  showToast(`${names.length}件のデータを削除しました`);
  updateBadge();
  renderCustomers();
  renderRequests();
  const btn = document.getElementById('select-all-btn');
  if (btn) btn.textContent = '☐ 全選択';
}

function deleteCustomer(name) {
  let all = JSON.parse(localStorage.getItem('hs_requests') || '[]');
  const targets = all.filter(r => r.name === name);
  all = all.filter(r => r.name !== name);
  requests = all;
  localStorage.setItem('hs_requests', JSON.stringify(all));
  targets.forEach(r => deleteBookingFromSheet(r.id));
  showToast(`${name}様のデータを削除しました`);
  updateBadge();
  renderCustomers();
  renderRequests();
}

function clearAllCustomers() {
  const btn = document.querySelector('#admin-tab-customers button');
  if (btn && btn.dataset.confirm === '1') {

      btn.dataset.confirm = '0';
      btn.textContent = '🗑 全件削除';
      btn.style.background = 'rgba(184,90,90,0.06)';
    }, 2500);
  }
}

function updateBadge() {
  const count = requests.filter(r => r.status === 'pending' || r.status === 'awaiting_customer').length;

  badge.textContent = count;

function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');

<div id="line-msg-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border-radius:16px;padding:24px;width:90%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.2);">

    <textarea id="line-msg-text" rows="4" style="width:100%;box-sizing:border-box;padding:12px;border-radius:8px;border:1px solid rgba(139,111,71,0.2);background:var(--bg);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;resize:vertical;" placeholder="メッセージを入力..."></textarea>

      <button onclick="closeSendMessageModal()" style="padding:8px 16px;border-radius:8px;border:1px solid rgba(139,111,71,0.3);background:transparent;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;">キャンセル</button>
      <button onclick="sendLineMessageFromAdmin()" style="padding:8px 16px;border-radius:8px;border:none;background:var(--accent);color:white;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;">送信</button>
    </div>
  </div>
</div>

<script>
// LINEメッセージ送信モーダル
let _currentLineUserId = '';
let _currentCustomerName = '';

function openSendMessageModal(bookingId) {
  const r = requests.find(x => x.id === bookingId);
  if (!r || !r.lineUserId) return;
  _currentLineUserId = r.lineUserId;
  _currentCustomerName = r.name;
  document.getElementById('line-msg-to').textContent = `送信先：${r.name} 様`;
  document.getElementById('line-msg-text').value = '';
  const modal = document.getElementById('line-msg-modal');
  modal.style.display = 'flex';
}

function closeSendMessageModal() {
  document.getElementById('line-msg-modal').style.display = 'none';
  _currentLineUserId = '';
}

function sendLineMessageFromAdmin() {
  const message = document.getElementById('line-msg-text').value.trim();
  if (!message) { showToast('メッセージを入力してください'); return; }
  if (!GAS_URL || !_currentLineUserId) return;

  fetch(GAS_URL, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ type: 'push_to_customer', userId: _currentLineUserId, message }),
  }).then(() => {
    showToast(`${_currentCustomerName}様にLINEを送信しました📤`);
    closeSendMessageModal();
  }).catch(e => {
    showToast('送信に失敗しました');
    console.error(e);
  });
}

// 「予約フォーム」タブを5回連続タップで管理画面を開く
let tapCount = 0;
let tapTimer = null;
document.getElementById('customer-tab').addEventListener('click', function(e) {
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => { tapCount = 0; }, 2000);
  if (tapCount >= 5) {
    tapCount = 0;
    showTab('admin');
  }
});
</script>
